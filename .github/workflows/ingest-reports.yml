name: Ingest Research Report

on:
  repository_dispatch:
    types: [ingest_report]

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Write payload to file
        env:
          PAYLOAD: ${{ toJSON(github.event.client_payload) }}
        run: printf '%s' "$PAYLOAD" > report.json

      - name: POST to production ingest endpoint
        env:
          INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
        run: |
          curl -sSf --fail-with-body \
            -X POST https://notepad-dvf7.onrender.com/api/reports/ingest \
            -H "Authorization: Bearer $INGEST_API_KEY" \
            -H "Content-Type: application/json" \
            -d @report.json
